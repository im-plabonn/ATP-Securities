<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATP Securities | Next-Gen Surveillance Systems</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- FontAwesome for Social Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=300;400;600;700&family=Space+Grotesk:wght=500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0b0f19;
        }
        .heading-font {
            font-family: 'Space Grotesk', sans-serif;
        }
        /* Scanning Line Effect */
        .scan-line {
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, transparent, #ef4444, transparent);
            position: absolute;
            animation: scan 4s linear infinite;
            opacity: 0.7;
            z-index: 10;
        }
        @keyframes scan {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }
        /* Camera Blinking REC Effect */
        .rec-dot {
            animation: blink 1.5s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex flex-col justify-between relative overflow-x-hidden selection:bg-blue-600 selection:text-white">

    <!-- Grid Background Texture -->
    <div class="absolute inset-0 bg-[linear-gradient(to_right,#1e293b_1px,transparent_1px),linear-gradient(to_bottom,#1e293b_1px,transparent_1px)] bg-[size:4rem_4rem] [mask-image:radial-gradient(ellipse_60%_50%_at_50%_50%,#000_70%,transparent_100%)] opacity-20 pointer-events-none"></div>

    <!-- Top Header -->
    <header class="container mx-auto px-6 py-6 flex justify-between items-center relative z-10">
        <div class="flex items-center gap-3">
            <!-- আপনার কোম্পানির মেইন লোগো এখানে বসবে -->
            <div class="bg-blue-600/5 border border-blue-500/20 p-1 rounded-lg shadow-[0_0_15px_rgba(37,99,235,0.1)]">
                <img src="logo.png" alt="ATP Securities Logo" class="w-9 h-9 object-contain block">
            </div>
            <span class="heading-font text-xl font-bold tracking-wider text-white">ATP <span class="text-blue-500">SECURITIES</span></span>
        </div>
        <div class="flex items-center gap-2 bg-slate-900/80 border border-slate-800 px-4 py-1.5 rounded-full text-sm font-medium backdrop-blur-sm">
            <span class="w-2 h-2 rounded-full bg-red-500 rec-dot"></span>
            <span class="text-slate-400 tracking-wide text-xs font-semibold">System Under Development</span>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="container mx-auto px-6 py-12 flex flex-col items-center text-center my-auto relative z-10">
        
        <!-- Surveillance Lens Block (আপনার কাস্টম ইমেজ শো করার জন্য) -->
        <div class="relative w-36 h-36 md:w-44 md:h-44 bg-slate-900 border-2 border-slate-800 rounded-full flex items-center justify-center mb-8 shadow-[0_0_50px_rgba(0,0,0,0.5)] overflow-hidden">
            <!-- Scanning line inside the lens -->
            <div class="scan-line rounded-full"></div>
            
            <!-- Lens Glass / Image Container -->
            <div class="w-28 h-28 md:w-36 md:h-36 bg-gradient-to-tr from-slate-950 to-slate-800 border border-slate-700 rounded-full flex items-center justify-center shadow-inner relative overflow-hidden bg-cover bg-center">
                
                <!-- মাঝখানের সিসিটিভি বা যেকোনো সিকিউরিটি গ্রাফিক ইমেজ এখানে বসবে -->
                <img src="surveillance-hub.png" alt="Surveillance Matrix" class="w-full h-full object-cover opacity-80 mix-blend-screen scale-105">
                
                <!-- Aperture/Lens Reflection Effect -->
                <div class="absolute top-3 right-3 w-6 h-2 bg-white/10 rounded-full rotate-45 pointer-events-none z-20"></div>
            </div>
            <!-- Outer Radar Ping Animation -->
            <div class="absolute inset-0 border border-blue-500/20 rounded-full animate-ping pointer-events-none"></div>
        </div>

        <!-- Tagline & Main Heading -->
        <p class="text-blue-400 font-semibold tracking-widest text-xs md:text-sm uppercase mb-3 heading-font">Your Trusted Security Solution</p>
        <h1 class="heading-font text-4xl md:text-6xl font-bold text-white max-w-3xl leading-tight mb-6">
           Stay Tuned <br><span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-indigo-400 to-blue-500">We're Coming Soon</span>
        </h1>
        
        <p class="text-slate-400 max-w-xl text-base md:text-lg mb-8 font-light">
CCTV Camera | Fire Alarm | Telephone Systems
        </p>

        <!-- Dynamic Notify Form -->
        <div class="w-full max-w-md bg-slate-900/60 border border-slate-800 p-2 rounded-xl backdrop-blur-md focus-within:border-blue-500/50 transition-all duration-300">
            <form action="#" method="POST" class="flex flex-col sm:flex-row gap-2" onsubmit="event.preventDefault(); alert('Thank you! We will notify you once we are live.');">
                <input type="email" required placeholder="Enter your email for early access" 
                       class="bg-transparent text-slate-200 placeholder-slate-500 px-4 py-3 rounded-lg focus:outline-none flex-grow text-sm">
                <button type="submit" 
                        class="bg-blue-600 hover:bg-blue-500 text-white font-semibold text-sm px-6 py-3 rounded-lg transition-all duration-200 cursor-pointer shadow-[0_4px_20px_rgba(37,99,235,0.3)] active:scale-98">
                    Get Notified
                </button>
            </form>
        </div>

    </main>

    <!-- Footer Security Badges & Socials -->
    <footer class="container mx-auto px-6 py-8 border-t border-slate-900/60 flex flex-col sm:flex-row justify-between items-center gap-4 relative z-10 text-sm">
        <p class="text-slate-500">&copy; 2026 ATP Securities. All rights reserved.</p>
        
        <!-- Trust Indicators -->
        <div class="flex items-center gap-6 text-slate-400 text-xs tracking-wider font-medium">
            <div class="flex items-center gap-1.5">
                <i class="fa-solid fa-eye text-blue-500"></i> 24/7 Monitoring
            </div>
            <div class="flex items-center gap-1.5">
                <i class="fa-solid fa-microchip text-blue-500"></i> Caardify Technology
            </div>
        </div>

        <!-- Social Media Links -->
        <div class="flex items-center gap-4">
            <a href="https://www.facebook.com/atpsecurities" target="_blank" class="w-8 h-8 rounded-lg bg-slate-900 border border-slate-800 flex items-center justify-center text-slate-400 hover:text-white hover:border-slate-700 transition-colors">
                <i class="fa-brands fa-facebook-f text-sm"></i>
            </a>
            <a href="#" class="w-8 h-8 rounded-lg bg-slate-900 border border-slate-800 flex items-center justify-center text-slate-400 hover:text-white hover:border-slate-700 transition-colors">
                <i class="fa-solid fa-envelope text-sm"></i>
            </a>
        </div>
    </footer>

</body>
</html>
